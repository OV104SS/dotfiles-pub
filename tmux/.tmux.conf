# ==========================================
# tmux Configuration
# ==========================================
# WARNING: This file is in a PUBLIC repository.
# DO NOT include secrets, credentials, tokens,
# API keys, or any sensitive information.
# ==========================================
#
# ※ プレフィックスキー (Prefix) = Ctrl+Space
#   以下、"Prefix, x" と書いてある場合は「Ctrl+Space を押して離し、その後 x を押す」という意味
#   "-n" がついているバインドはプレフィックス不要で直接キーを押す
#   "-r" がついているバインドはプレフィックスを押した後、連続で押せる (リピート可能)

# --- プレフィックスの再定義 ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- 基本設定  ---
set -g base-index 1           # 窓番号を1から開始 (元: 0)
setw -g pane-base-index 1     # ペイン番号を1から開始 (元: 0)
set -g renumber-windows on    # 窓が閉じられたら番号を詰める (元: 欠番維持)
set -g mouse on               # マウス操作有効 (直感的なスクロール)
set -g history-limit 50000    # 履歴を増やす (元: 2000)
set -g display-panes-time 3000  # ペイン番号の表示時間を3秒に (元: 1秒)
# セッション破棄時に他のセッションへ自動移動
# no-detached は tmux 3.2+ のオプション。3.1以前では on にフォールバック
if-shell 'tmux -V | awk "{v=\$2+0; exit (v >= 3.2) ? 0 : 1}"' \
  'set -g detach-on-destroy no-detached' \
  'set -g detach-on-destroy on'

# キー入力の待ち時間を短縮 (SSH経由の遅延を考慮して1ms)
set -sg escape-time 1

# 設定再読み込み
# 操作: Prefix, r  → 設定ファイルを再読み込みして "Reloaded!" と表示
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- 領域の最大化 (Zoom) ---
# 操作: Prefix, z  → 現在のペインを全画面表示/元に戻す (トグル)
# エディタやClaude Codeを一時的に全画面にしたい時に便利
bind z resize-pane -Z

# SSH環境でのクリップボード共有を有効化
set -s set-clipboard on

# コピーモードでvimキーバインドを使用
setw -g mode-keys vi

# --- ペインのリサイズ ---
# "-r" = リピート可能
# 操作: Prefix, h  → 左方向に3列分広げる
# 操作: Prefix, j  → 下方向に3行分広げる
# 操作: Prefix, k  → 上方向に3行分広げる
# 操作: Prefix, l  → 右方向に3列分広げる
bind -r h resize-pane -L 3
bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 3

# --- ペイン間の移動 (Prefix不要, Vimライク) ---
# 操作: Alt+h  → 左のペインへ移動
# 操作: Alt+j  → 下のペインへ移動
# 操作: Alt+k  → 上のペインへ移動
# 操作: Alt+l  → 右のペインへ移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- アクティビティ通知の無効化 ---
# 他のウィンドウで出力があっても通知しない (邪魔にならないように)
setw -g monitor-activity off
set -g visual-activity off

# --- セッション管理 ---
# 操作: Prefix, C  → 新規セッションを作成（名前入力プロンプト付き）
bind C command-prompt -p "new session:" "new-session -s '%%'"

# --- ウィンドウ管理 (Prefix不要) ---
# 操作: Alt+[  → 前のウィンドウへ移動
# 操作: Alt+]  → 次のウィンドウへ移動
# 操作: Prefix, Tab  → 最後に使ったウィンドウにトグル
bind -n M-[ previous-window
bind -n M-] next-window
bind Tab last-window
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# --- ペインの分割 ---
# 操作: Prefix, -  → 上下に分割（カレントディレクトリを引き継ぐ）
# 操作: Prefix, \  → 左右に分割（カレントディレクトリを引き継ぐ）
# 操作: Prefix, c  → 新規ウィンドウ（カレントディレクトリを引き継ぐ）
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- ヘルプ表示 ---
# 操作: Prefix, ?  → キーバインドのチートシートを表示
# ヘルプ本文は tmux-help.txt に分離 (セットアップ: ln -s .../tmux/tmux-help.txt ~/.config/tmux/help.txt)
# display-popup は tmux 3.2+ の機能。3.1以前では new-window にフォールバック
if-shell 'tmux -V | awk "{v=\$2+0; exit (v >= 3.2) ? 0 : 1}"' \
  'bind ? display-popup -w 58 -h 32 -T " Keybindings " -E "less ~/.config/tmux/help.txt"' \
  'bind ? new-window -n help "less ~/.config/tmux/help.txt"'

# --- 見た目の設定 (スタイル) ---

# ロケール環境変数をtmuxセッションに引き継ぐ
# LANG, LC_* は SSH 接続時の日本語表示に必要
set-option -ga update-environment ' LANG LC_ALL LC_CTYPE'

# ── ステータスバー ──
set -g status-style 'bg=colour235,fg=colour248'
set -g status-left '#[fg=colour16,bg=colour75,bold] #{session_name} #[bg=colour235] '
set -g status-left-length 20
# バッテリー表示（Linuxのみ。BAT[0-9] で BAT0/BAT1 等を自動検出）
set -g status-right '#[fg=colour245]#{=-30:pane_current_path} #[fg=colour248]#(whoami)@#h#[fg=colour245]#(cat /sys/class/power_supply/BAT[0-9]/capacity 2>/dev/null | head -1 | xargs -I{} printf " {}%%") │#[fg=colour75,bold] %H:%M '
set -g status-right-length 90
set -g status-interval 30

# ウィンドウ一覧（中央）
set -g window-status-format '#[fg=colour245] #I:#W '
set -g window-status-current-format '#[fg=colour16,bg=colour75,bold] #I:#W '
set -g window-status-separator ''

# ── ペイン ──
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour75

# 非アクティブなペイン → 背景を少し暗く (どのペインがアクティブか分かりやすく)
set -g window-style 'bg=colour236'

# アクティブなペイン → 背景を黒に
set -g window-active-style 'bg=black'

# --- OSごとのデフォルトシェル設定 ---
# OSを判別し、適切なデフォルトシェルを指定する
if-shell 'uname | grep -q Darwin' \
  'set -g default-shell /opt/homebrew/bin/bash' \
  'if-shell "uname | grep -q Linux" "set -g default-shell /bin/bash"'
